<div class="container py-5" style="max-width: 600px;">
  <h2 class="mb-4 text-center">{{ title }}</h2>

  <div class="input-group mb-4 shadow-sm">
    <input 
      type="text" 
      class="form-control p-3" 
      [(ngModel)]="nuevoArtista" 
      placeholder="Nombre del artista"
    >
    <button class="btn btn-primary px-4" (click)="agregar()">
      Agregar
    </button>
  </div>

  <div class="list-group shadow-sm">
    <div *ngFor="let artista of artistas; let i = index" 
        class="list-group-item d-flex justify-content-between align-items-center p-3">
      
      <div class="d-flex align-items-center gap-3">
        <div>
          <h6 class="mb-0 fw-bold">{{ artista.nombre }}</h6>
          <small class="text-secondary">Álbum: {{ artista.album }}</small>
        </div>
      </div>

      <div class="d-flex gap-2">
        <button class="btn btn-sm" 
                [ngClass]="artista.favorito ? 'btn-warning' : 'btn-outline-secondary'"
                (click)="artista.favorito = !artista.favorito">
          ★
        </button>
        <button class="btn btn-sm btn-outline-danger" (click)="eliminar(i)">
          Eliminar
        </button>
      </div>

    </div>
  </div>
</div>
